<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDS Narada | Portal Pengumuman Kelulusan</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        body { 
            font-family: 'Inter', sans-serif; color: #f8fafc; margin: 0; min-height: 100vh;
            background-image: url('assets/background.png'); background-size: cover; background-position: center; background-attachment: fixed;
        }
        
        .header-portal { 
            background-color: rgba(15, 23, 42, 0.25); /* Transparansi 25% */
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .card-main { 
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(16px); 
        }

        /* Efek Glow Tipis & Halus */
        .glow-success { 
            border: 1px solid rgba(16, 185, 129, 0.2) !important;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.08);
        }
        
        .glow-fail {
            border: 1px solid rgba(239, 68, 68, 0.15) !important;
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.05);
        }

        /* Animasi Custom */
        .animate-card { animation: fadeInUp 0.8s ease-out forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex flex-col relative w-full min-h-screen">
    <header id="mainHeader" class="header-portal sticky top-0 z-40 w-full py-3">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <h1 class="text-sm font-bold tracking-tight">SDS NARADA</h1>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-10 flex-1 w-full flex items-center justify-center z-10">
        <section id="view-result" class="w-full">
            <div id="resultCard" class="w-full"></div>
        </section>
    </main>

    <script>
        // ... (Masukkan Firebase Config Anda di sini)

        function renderHasilSiswaCard(s) {
            const resCard = document.getElementById('resultCard');
            const isLulus = s.status === "LULUS";
            
            // Terapkan class animate-card dan glow yang halus
            resCard.className = `animate-card card-main rounded-2xl p-6 md:p-8 ${isLulus ? 'glow-success' : 'glow-fail'}`;

            resCard.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-start">
                    <div class="md:col-span-4 bg-slate-900/30 p-5 rounded-xl border border-white/5 text-center">
                        <h3 class="text-sm font-bold uppercase">${s.nama}</h3>
                        <div class="text-left mt-4 text-[11px] space-y-2 text-slate-300">
                            <div><span class="text-slate-500">TTL:</span> <span class="font-semibold">${s.ttl}</span></div>
                            <div><span class="text-slate-500">NIS:</span> <span class="font-semibold">${s.nis}</span></div>
                        </div>
                    </div>
                    <div class="md:col-span-8 space-y-4">
                        <div class="bg-slate-900/40 rounded-xl p-4 border border-white/5">
                            <h4 class="text-[11px] font-bold uppercase text-slate-400 mb-3">Transkrip Nilai</h4>
                            </div>
                        <div class="text-center p-3.5 rounded-xl border ${isLulus ? 'bg-emerald-950/40 border-emerald-500/10' : 'bg-rose-950/40 border-rose-500/10'}">
                            <div class="text-xl font-black ${isLulus ? 'text-emerald-400' : 'text-rose-400'} uppercase">${s.status}</div>
                            <span class="text-[10px] text-slate-400">Tahun Ajaran 2025/2026</span>
                        </div>
                    </div>
                </div>
            `;
        }
        // ... (Sisa fungsi logika lainnya)
    </script>
</body>
</html>
