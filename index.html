<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDS Narada | Portal Pengumuman Kelulusan</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        body { 
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen relative">

    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/70 backdrop-blur-md border-b border-slate-200 shadow-sm transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex items-center gap-4">
                    <img src="logo.png" alt="Logo SDS Narada" class="h-12 w-auto animate__animated animate__fadeInLeft">
                    <div class="animate__animated animate__fadeInRight">
                        <h1 class="text-xl sm:text-2xl font-bold text-slate-800 leading-tight">SDS NARADA</h1>
                        <p class="text-xs sm:text-sm font-medium text-slate-500">Portal Pengumuman Kelulusan</p>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-28 pb-10 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto min-h-screen">
        
        <div id="hasilKelulusan" class="bg-white p-6 rounded-2xl shadow-lg border border-slate-100 max-w-3xl mx-auto hidden animate__animated animate__zoomIn">
            <h2 class="text-2xl font-bold text-center text-slate-800 mb-6">Status Kelulusan</h2>
            
            <div class="space-y-4">
                <div class="flex justify-between border-b pb-2">
                    <span class="text-slate-500">Nama Lengkap</span>
                    <span id="namaSiswa" class="font-semibold text-slate-800"></span>
                </div>
                <div class="flex justify-between border-b pb-2">
                    <span class="text-slate-500">NISN</span>
                    <span id="nisnSiswa" class="font-semibold text-slate-800"></span>
                </div>
                <div class="flex justify-between border-b pb-2">
                    <span class="text-slate-500">Status</span>
                    <span id="statusKelulusan" class="font-bold text-lg"></span>
                </div>
            </div>

            <div class="mt-8 flex justify-center gap-4">
                <button onclick="kembali()" class="px-6 py-2.5 bg-slate-200 text-slate-700 font-semibold rounded-lg hover:bg-slate-300 transition-colors">
                    Kembali
                </button>
                
                <a id="btnDownloadSKL" href="#" target="_blank" class="px-6 py-2.5 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition-colors shadow-md hidden flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Download SKL
                </a>
            </div>
        </div>

    </main>

    <script>
        // ==========================================
        // 1. PENGATURAN ADMIN: TAMPILKAN TOMBOL SKL
        // ==========================================
        // Ubah true untuk menampilkan, false untuk menyembunyikan.
        const TAMPILKAN_TOMBOL_SKL = false; 
        
        // Konfigurasi Firebase Anda (Contoh, tetap gunakan milik Anda)
        const firebaseConfig = {
            apiKey: "API_KEY_ANDA",
            authDomain: "DOMAIN_ANDA",
            databaseURL: "URL_DATABASE_ANDA",
            projectId: "PROJECT_ID_ANDA"
        };
        
        // Inisialisasi Firebase (Hanya jika belum diinisialisasi)
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // ==========================================
        // 2. LOGIKA MENAMPILKAN DATA & TOMBOL SKL
        // ==========================================
        function tampilkanDataSiswa(dataSiswa) {
            const wadahHasil = document.getElementById('hasilKelulusan');
            const btnSKL = document.getElementById('btnDownloadSKL');
            const statusKelulusan = document.getElementById('statusKelulusan');
            
            // Isi data teks
            document.getElementById('namaSiswa').innerText = dataSiswa.nama;
            document.getElementById('nisnSiswa').innerText = dataSiswa.nisn;
            
            // Atur warna status (Lulus / Tidak Lulus)
            if (dataSiswa.status === "LULUS") {
                statusKelulusan.innerText = "LULUS";
                statusKelulusan.className = "font-bold text-lg text-emerald-600";
            } else {
                statusKelulusan.innerText = "TIDAK LULUS";
                statusKelulusan.className = "font-bold text-lg text-red-600";
            }

            // --- LOGIKA TOGGLE SKL ---
            // Tombol akan muncul JIKA pengaturan = true DAN siswa punya link SKL
            if (TAMPILKAN_TOMBOL_SKL && dataSiswa.linkSKL && dataSiswa.linkSKL !== "") {
                btnSKL.style.display = 'inline-flex'; // Tampilkan tombol
                btnSKL.href = dataSiswa.linkSKL;      // Setel link download
            } else {
                btnSKL.style.display = 'none';        // Sembunyikan tombol
                btnSKL.href = "#";
            }
            
            // Tampilkan container hasil
            wadahHasil.style.display = 'block';
            wadahHasil.classList.remove('hidden');
        }

        // Fungsi dummy untuk tombol kembali
        function kembali() {
            document.getElementById('hasilKelulusan').style.display = 'none';
            // Tampilkan kembali form login/pencarian Anda di sini
        }

        // Contoh simulasi pemanggilan (hapus atau sesuaikan dengan fungsi login Anda)
        /*
        db.ref('siswa/' + NISN_INPUT).once('value').then((snapshot) => {
            if(snapshot.exists()) {
                tampilkanDataSiswa(snapshot.val());
            }
        });
        */
    </script>
</body>
</html>
